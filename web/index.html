<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
  }
  #topbar {
    height: 40px;
    background: #111;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 10px;
    font-family: sans-serif;
  }
  #topbar .left {
    flex: 0 0 auto;
    font-weight: bold;
  }
  #topbar .right {
    flex: 1 1 auto;
    text-align: right;
    white-space: nowrap;
  }
  #container {
    display: flex;
    width: 100%;
    height: calc(100% - 40px);
  }
  .frame {
    width: 50%;
    height: 100%;
    border: none;
  }
</style>
</head>
<body>
  <div id="topbar">
    <div class="left">Trustable</div>
    <div class="right">
      http://localhost:5173 &nbsp;&nbsp; | &nbsp;&nbsp; http://localhost:4096
    </div>
  </div>
  <div id="container">
    <iframe class="frame" src="http://localhost:4096"></iframe>
    <iframe class="frame" src="http://localhost:5173"></iframe>
  </div>
</body>
</html>
